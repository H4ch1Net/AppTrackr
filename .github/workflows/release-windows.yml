name: Release Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build PyInstaller app
        shell: pwsh
        run: |
          pyinstaller packaging/apptrackr.spec

      - name: Zip portable build
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/AppTrackr/*" -DestinationPath "dist/AppTrackr_Portable.zip" -Force

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:/Program Files (x86)/Inno Setup 6/ISCC.exe" "packaging/installer.iss"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/AppTrackr_Setup.exe
            dist/AppTrackr_Portable.zip
            README.md
          generate_release_notes: true
